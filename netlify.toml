[build]
  command   = "npm run build"
  publish   = "out"

[build.environment]
  NODE_VERSION = "20"

# Notifica email per ogni invio del form "contatti"
[[forms]]
  name = "contatti"

[[notifications.email]]
  event   = "submission_created"
  form    = "contatti"
  to      = "tonyfava90@gmail.com"
  subject = "Nuovo messaggio - La Traccia Strumenti Musicali"

# Redirect rules so direct URL access to sub-pages works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
